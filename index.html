<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <dialog class="startDialog">
        <form method="dialog" class="modal-content">
            <h2>Tic-Tac-Toe</h2>
            <div>
                <input type="text" id="p1-name" placeholder="Player 1">
                <input type="text" id="p2-name" placeholder="Player 2">
            </div>

            <button class="startBtn">Start</button>
        </form>
    </dialog>

    <div class="container">
        <div class="players">
            <div class="player1">
                <div class="name"></div>
                <div class="mark"></div>
            </div>
            <div class="player2">
                <div class="mark"></div>
                <div class="name"></div>
            </div>
        </div>
        <div class="board-wrapper">
            <div class="board"></div>
        </div>
    </div>

    <dialog class="endDialog">
        <div class="modal-content">
            <div class="result-text"></div>
            <div class="buttons">
                <button class="homeBtn">Home</button>
                <button class="restartBtn">Restart</button>
            </div>
        </div>
    </dialog>
    <script src="script.js"></script>
</body>
</html>
